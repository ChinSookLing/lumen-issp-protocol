# .github/workflows/dms-silent-check.yml
# Lumen ISSP — Dead Man's Switch Silent Check
# Step B4 DMS CI · M95-D02 #2 Authorized
# Sprint 13 · Owner: Node-01 + Tuzi
#
# Runs weekly. If no qualifying activity detected in 14 days,
# opens a GitHub Issue to alert the Council.
#
# "有回應" definition (M95-D02):
#   - repo commit on main branch
#   - Council meeting minutes committed
#   - GitHub Issue/PR activity by ChinSookLing
#   - Manual dispatch of this workflow (counts as activity)
#
# Does NOT count:
#   - Bot commits
#   - Dependabot PRs
#   - CI workflow runs (only human-initiated counts)

name: DMS Silent Check

on:
  schedule:
    - cron: '0 3 * * 1'  # Every Monday 03:00 UTC
  workflow_dispatch:       # Manual trigger = counts as activity

permissions:
  issues: write
  contents: read

jobs:
  check-activity:
    runs-on: ubuntu-latest
    steps:
      - name: Check recent activity
        id: activity
        uses: actions/github-script@v7
        with:
          script: |
            const IDLE_DAYS = 14;
            const cutoff = new Date();
            cutoff.setDate(cutoff.getDate() - IDLE_DAYS);
            const since = cutoff.toISOString();

            console.log(`Checking activity since ${since} (${IDLE_DAYS} days)`);

            // Check 1: Recent commits on main by ChinSookLing
            const commits = await github.rest.repos.listCommits({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: 'main',
              since: since,
              per_page: 5
            });

            const humanCommits = commits.data.filter(c => {
              const author = c.author?.login || c.commit?.author?.name || '';
              return author === 'ChinSookLing' || author.includes('Tuzi');
            });

            if (humanCommits.length > 0) {
              console.log(`✅ Found ${humanCommits.length} human commit(s)`);
              core.setOutput('active', 'true');
              return;
            }

            // Check 2: Recent Issues/PRs by ChinSookLing
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              since: since,
              per_page: 10,
              state: 'all'
            });

            const humanIssues = issues.data.filter(i => {
              return i.user?.login === 'ChinSookLing';
            });

            if (humanIssues.length > 0) {
              console.log(`✅ Found ${humanIssues.length} human issue/PR(s)`);
              core.setOutput('active', 'true');
              return;
            }

            // Check 3: Manual dispatch counts as activity
            if (context.eventName === 'workflow_dispatch') {
              console.log('✅ Manual dispatch = activity confirmed');
              core.setOutput('active', 'true');
              return;
            }

            console.log('⚠️  No qualifying activity detected');
            core.setOutput('active', 'false');

      - name: Create alert issue if idle
        if: steps.activity.outputs.active == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            // Check if an open DMS alert already exists
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'dms-alert',
              state: 'open',
              per_page: 1
            });

            if (existing.data.length > 0) {
              console.log('DMS alert already open, skipping duplicate');
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '⚠️ DMS Alert — No activity detected (14 days)',
              body: [
                '## Dead Man\'s Switch — Stage 1 Alert',
                '',
                `**Triggered:** ${new Date().toISOString()}`,
                '**Threshold:** 14 days with no qualifying activity',
                '',
                '### What qualifies as "activity":',
                '- Commit on main by ChinSookLing',
                '- GitHub Issue/PR by ChinSookLing',
                '- Manual dispatch of DMS workflow',
                '',
                '### Next steps:',
                '1. If Tuzi is available: close this issue and make a commit',
                '2. If Tuzi is unreachable: Trusted Contacts should be notified',
                '3. Refer to `ops/continuity.md` for full DMS protocol',
                '',
                '---',
                '*This alert was auto-generated by the DMS Silent Check workflow.*',
                '*See: ops/continuity.md · B4 §12.2 · M95-D02*'
              ].join('\n'),
              labels: ['dms-alert']
            });

            console.log('🚨 DMS alert issue created');
