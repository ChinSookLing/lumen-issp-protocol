name: Validate Mapping Schema

on:
  pull_request:
    paths:
      - 'mappings/**'
      - 'schemas/**'
  push:
    branches: [ main ]
    paths:
      - 'mappings/**'
      - 'schemas/**'

jobs:
  validate-mapping-schema:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Validate mapping JSON files
        run: node scripts/ci/validate-mapping.js
        
      - name: Validate JSON syntax only (fast path)
        run: node scripts/ci/validate-mapping.js --syntax-only
