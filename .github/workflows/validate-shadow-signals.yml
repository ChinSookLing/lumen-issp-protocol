name: Validate Shadow Signals

on:
  pull_request:
    paths:
      - 'core/**'
      - 'src/snapshot.js'
  push:
    branches: [ main ]
    paths:
      - 'core/**'
      - 'src/snapshot.js'

jobs:
  validate-shadow:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run shadow signals presence check
        run: node scripts/ci/validate-shadow-signals.js
        
      - name: Warning only - not blocking
        if: always()
        run: echo "⚠️  Shadow signals check completed (warnings only)"
