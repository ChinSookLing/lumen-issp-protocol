name: Validate Component Registry

on:
  workflow_dispatch: {}
  pull_request:
    paths:
      - 'core/**'
      - 'src/registry/**'
      - 'schemas/**'
      - 'mappings/**'
      - 'scripts/ci/**'
  push:
    branches: [ main ]
    paths:
      - 'core/**'
      - 'src/registry/**'
      - 'schemas/**'
      - 'mappings/**'

jobs:
  validate-registry:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run registry validation
        run: node scripts/ci/validate-registry.js
        
      - name: Verify schema enum matches registry
        run: node scripts/ci/validate-registry.js --check-schema
